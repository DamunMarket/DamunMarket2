name: Update daily rankings

on:
  schedule:
    # 매일 22:00 UTC = 07:00 KST
    - cron: "0 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-rankings:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch Coupang ranking
        continue-on-error: true
        env:
          COUPANG_ACCESS_KEY: ${{ secrets.COUPANG_ACCESS_KEY }}
          COUPANG_SECRET_KEY: ${{ secrets.COUPANG_SECRET_KEY }}
        run: python scripts/fetch_coupang_ranking.py

      - name: Fetch search ranking
        continue-on-error: true
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python scripts/fetch_search_ranking.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/coupang-ranking.json data/search-ranking.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: 오늘의 랭킹 데이터 갱신 ($(date -u +%Y-%m-%d))"
            git push
          fi
